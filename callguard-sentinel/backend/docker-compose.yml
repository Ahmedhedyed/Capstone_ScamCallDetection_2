version: "3.9"

services:
  api-gateway:
    build: .
    container_name: callguard-api-gateway
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - env.example
    depends_on:
      - db
      - audio-service
      - transcription-service
      - feature-service
      - analysis-service
      - alerting-service

  audio-service:
    build: .
    container_name: callguard-audio
    command: uvicorn audio_app:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - env.example

  transcription-service:
    build: .
    container_name: callguard-transcription
    command: uvicorn transcription_app:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    env_file:
      - env.example

  feature-service:
    build: .
    container_name: callguard-feature
    command: uvicorn feature_app:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    env_file:
      - env.example

  analysis-service:
    build: .
    container_name: callguard-analysis
    command: uvicorn analysis_app:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    env_file:
      - env.example

  alerting-service:
    build: .
    container_name: callguard-alerting
    command: uvicorn alerting_app:app --host 0.0.0.0 --port 8005
    ports:
      - "8005:8005"
    env_file:
      - env.example

  db:
    image: postgres:15
    container_name: callguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: callguard
      POSTGRES_USER: callguard_user
      POSTGRES_PASSWORD: callguard_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:



